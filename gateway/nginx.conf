events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Basic Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";

    server {
        listen 80;

        # 1. Static Frontend (Berkshire Style)
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
        }

        # 2. API Gateway Routing
        location /api/ {
            # Route strictly to the Producer Microservice
            proxy_pass http://transaction-producer:8081;

            # Preserve Client Context
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Gateway Timeout Settings
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }

        # 3. Health Check Endpoint for the Gateway itself
        location /health {
            return 200 'Gateway is operational';
            add_header Content-Type text/plain;
        }
    }
}